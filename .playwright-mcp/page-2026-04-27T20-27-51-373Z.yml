    - generic [ref=e68]:
      - paragraph [ref=e69]: They don't need much. Just each other.
      - paragraph [ref=e70]: In a small dimly lit space, these children have created their own world. Gathered together — moving, talking, laughing, simply being — they remind us that community is not built with money. It is built with presence.
      - paragraph [ref=e71]: No screens. No toys. Just children doing what children do best — connecting.
      - paragraph [ref=e72]: But they deserve more than a dark corner. They deserve bright, safe spaces where their energy, creativity, and voices can truly shine.
      - paragraph [ref=e73]: That is what we are building.
      - link "👉 Help us create safe spaces where Kibera's children can thrive" [ref=e74] [cursor=pointer]:
        - /url: "#contact"
