    - generic [ref=e90]:
      - paragraph [ref=e91]: They don't need much. Just each other.
      - paragraph [ref=e92]: In a small dimly lit space, these children have created their own world. Gathered together — moving, talking, laughing, simply being — they remind us that community is not built with money. It is built with presence.
      - paragraph [ref=e93]: No screens. No toys. Just children doing what children do best — connecting.
      - paragraph [ref=e94]: But they deserve more than a dark corner. They deserve bright, safe spaces where their energy, creativity, and voices can truly shine.
      - paragraph [ref=e95]: That is what we are building.
      - link "Help us create safe spaces where Kibera's children can thrive" [ref=e96] [cursor=pointer]:
        - /url: "#contact"
