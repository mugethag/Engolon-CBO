        - generic [ref=e62]: strength, power, energy
      - paragraph [ref=e63]:
        - text: A Maasai word expressing physical strength, capability, and intensity. Used in cultural mottos to denote resilience and power—as in
        - emphasis [ref=e64]: "\"Naboisho ang, engolon ang\""
        - text: meaning
        - strong [ref=e65]: "\"Our unity, our strength\""
    - paragraph [ref=e66]: Engolon Community Based Organization is a Kenya-centered organization with a global audience, dedicated to empowering vulnerable populations through skills training, financial support, education, and access to essential services. Every person deserves the opportunity to thrive.
