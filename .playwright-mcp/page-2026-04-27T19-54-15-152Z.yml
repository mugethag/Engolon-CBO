      - heading "Our Stories" [level=2] [ref=e64]
      - paragraph [ref=e65]: Celebrating the moments that define us
    - generic [ref=e66]:
      - img "Community members celebrating together" [ref=e67]
      - img "A joyful moment during a community event" [ref=e68]
      - img "Children gathered together in a small community space in Kibera" [ref=e69]
    - generic [ref=e70]:
      - paragraph [ref=e71]: They don't need much. Just each other.
      - paragraph [ref=e72]: In a small dimly lit space, these children have created their own world. Gathered together — moving, talking, laughing, simply being — they remind us that community is not built with money. It is built with presence.
      - paragraph [ref=e73]: No screens. No toys. Just children doing what children do best — connecting.
      - paragraph [ref=e74]: But they deserve more than a dark corner. They deserve bright, safe spaces where their energy, creativity, and voices can truly shine.
      - paragraph [ref=e75]: That is what we are building.
      - link "👉 Help us create safe spaces where Kibera's children can thrive" [ref=e76] [cursor=pointer]:
        - /url: "#contact"
