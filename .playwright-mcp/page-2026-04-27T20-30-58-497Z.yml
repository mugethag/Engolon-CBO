    - generic [ref=e91]:
      - paragraph [ref=e92]: They don't need much. Just each other.
      - paragraph [ref=e93]: In a small dimly lit space, these children have created their own world. Gathered together — moving, talking, laughing, simply being — they remind us that community is not built with money. It is built with presence.
      - paragraph [ref=e94]: No screens. No toys. Just children doing what children do best — connecting.
      - paragraph [ref=e95]: But they deserve more than a dark corner. They deserve bright, safe spaces where their energy, creativity, and voices can truly shine.
      - paragraph [ref=e96]: That is what we are building.
      - link "Help us create safe spaces where Kibera's children can thrive" [ref=e97] [cursor=pointer]:
        - /url: "#contact"
